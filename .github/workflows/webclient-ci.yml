name: Web Client CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'swingmusic-webclient/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'swingmusic-webclient/**'
  workflow_dispatch:

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: swingmusic-webclient/package-lock.json
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    - name: Install dependencies
      run: |
        cd swingmusic-webclient
        npm ci
    
    - name: Run lint
      run: |
        cd swingmusic-webclient
        npm run lint
    
    - name: Type check
      run: |
        cd swingmusic-webclient
        npx vue-tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: swingmusic-webclient/package-lock.json
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    - name: Install dependencies
      run: |
        cd swingmusic-webclient
        npm ci
    
    - name: Build
      run: |
        cd swingmusic-webclient
        npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: webclient-dist
        path: swingmusic-webclient/dist/
        retention-days: 30
